<?xml version="1.0" encoding="UTF-8"?>
<!--
  Savdo Seller sub-mark — cyan gradient (#06B6D4 → #22D3EE).
  Для seller-facing material (CRM, dashboard, TG-bot для продавцов).
  Bag → витрина/storefront (одна линия сверху = табличка магазина).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Savdo for sellers">
  <title>Savdo — для продавцов</title>
  <defs>
    <linearGradient id="savdoSeller" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#savdoSeller)"/>

  <!-- Storefront awning (3 arched segments) -->
  <path d="M12 22 L20 14 L28 22 L36 14 L44 22 L52 14"
        fill="none" stroke="white" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Storefront body -->
  <rect x="14" y="24" width="36" height="32" rx="4" fill="white" fill-opacity="0.95"/>

  <!-- Door -->
  <rect x="28" y="36" width="8" height="20" rx="1" fill="url(#savdoSeller)"/>

  <!-- Sign "S" -->
  <text x="32" y="34" text-anchor="middle"
        font-family="ui-rounded, system-ui, sans-serif"
        font-size="10" font-weight="800"
        fill="url(#savdoSeller)">SAVDO</text>
</svg>
