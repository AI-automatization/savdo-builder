<?xml version="1.0" encoding="UTF-8"?>
<!--
  Savdo — wordmark (mark + text inline). Для header / hero / email signature.
  Размер base: 240×64 (можно scale).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" width="240" height="64" role="img" aria-label="Savdo">
  <title>Savdo</title>
  <defs>
    <linearGradient id="savdoBrandWM" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <!-- Mark (mini, 48×48) -->
  <g transform="translate(8 8) scale(0.75)">
    <rect x="0" y="0" width="60" height="60" rx="14" fill="url(#savdoBrandWM)"/>
    <path d="M20 20 V16 C20 10.5 24.5 6 30 6 C35.5 6 40 10.5 40 16 V20"
          fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M14 20 H46 L44 50 C43.5 52.5 41.5 54 39 54 H21 C18.5 54 16.5 52.5 16 50 Z"
          fill="white" fill-opacity="0.95"/>
    <text x="30" y="42" text-anchor="middle"
          font-family="ui-rounded, system-ui, sans-serif"
          font-size="20" font-weight="800"
          fill="url(#savdoBrandWM)">S</text>
  </g>

  <!-- Wordmark -->
  <text x="68" y="42"
        font-family="ui-rounded, 'SF Pro Rounded', system-ui, sans-serif"
        font-size="32" font-weight="800"
        fill="url(#savdoBrandWM)"
        letter-spacing="-0.01em">Savdo</text>
</svg>
