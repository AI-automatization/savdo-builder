name: CI — web-buyer tests

on:
  push:
    branches: [main, web-buyer]
    paths:
      - 'apps/web-buyer/**'
      - 'packages/types/**'
      - '.github/workflows/ci-web-buyer-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/web-buyer/**'
      - 'packages/types/**'

jobs:
  test:
    name: Vitest smoke (web-buyer)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Vitest smoke
        run: pnpm --filter web-buyer test
