name: CI — web-seller tests

on:
  push:
    branches: [main, web-seller]
    paths:
      - 'apps/web-seller/**'
      - 'packages/types/**'
      - '.github/workflows/ci-web-seller-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/web-seller/**'
      - 'packages/types/**'

jobs:
  test:
    name: Vitest smoke (web-seller)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Vitest smoke
        run: pnpm --filter web-seller test
