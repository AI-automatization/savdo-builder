name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfLO https://github.com/gitleaks/gitleaks/releases/download/v8.22.1/gitleaks_8.22.1_linux_x64.tar.gz
          echo "2f92ab3b8e08319ac30836c32b90818e01519c3a4982771e4f45a7f5607872f7  gitleaks_8.22.1_linux_x64.tar.gz" | sha256sum -c -
          tar -xz -C /usr/local/bin -f gitleaks_8.22.1_linux_x64.tar.gz gitleaks

      - name: Run gitleaks
        run: gitleaks detect --source=. --redact --log-opts="HEAD~1..HEAD"
