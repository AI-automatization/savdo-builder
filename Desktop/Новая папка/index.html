<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopHub — Маркетплейс</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="container header__inner">
      <div class="logo">Shop<span>Hub</span></div>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Поиск товаров..." />
        <button id="searchBtn">Найти</button>
      </div>
      <button class="cart-btn" id="cartBtn">
        Корзина <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </header>

  <!-- CATEGORIES -->
  <section class="categories">
    <div class="container">
      <button class="cat-btn active" data-cat="all">Все</button>
      <button class="cat-btn" data-cat="electronics">Электроника</button>
      <button class="cat-btn" data-cat="clothing">Одежда</button>
      <button class="cat-btn" data-cat="home">Дом и сад</button>
      <button class="cat-btn" data-cat="sport">Спорт</button>
    </div>
  </section>

  <!-- MAIN -->
  <main class="container main">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h3>Фильтры</h3>
      <div class="filter-group">
        <label>Цена до: <strong id="priceLabel">50 000 ₽</strong></label>
        <input type="range" id="priceRange" min="0" max="50000" value="50000" step="500" />
      </div>
      <div class="filter-group">
        <label>Рейтинг</label>
        <select id="ratingFilter">
          <option value="0">Любой</option>
          <option value="3">От 3 звёзд</option>
          <option value="4">От 4 звёзд</option>
          <option value="4.5">От 4.5 звёзд</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Сортировка</label>
        <select id="sortFilter">
          <option value="default">По умолчанию</option>
          <option value="price-asc">Цена: дешевле</option>
          <option value="price-desc">Цена: дороже</option>
          <option value="rating">По рейтингу</option>
        </select>
      </div>
      <button id="resetFilters" class="reset-btn">Сбросить</button>
    </aside>

    <!-- PRODUCTS -->
    <div class="products-area">
      <div class="products-header">
        <p id="resultsCount"></p>
      </div>
      <div class="products-grid" id="productsGrid"></div>
    </div>
  </main>

  <!-- CART MODAL -->
  <div class="cart-overlay" id="cartOverlay"></div>
  <div class="cart-panel" id="cartPanel">
    <div class="cart-header">
      <h2>Корзина</h2>
      <button class="close-cart" id="closeCart">&times;</button>
    </div>
    <div class="cart-items" id="cartItems">
      <p class="cart-empty">Корзина пуста</p>
    </div>
    <div class="cart-footer" id="cartFooter" style="display:none">
      <div class="cart-total">Итого: <strong id="cartTotal">0 ₽</strong></div>
      <button class="checkout-btn" id="checkoutBtn">Оформить заказ</button>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
