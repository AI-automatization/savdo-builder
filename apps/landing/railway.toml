[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["apps/landing/**"]

[build.args]
NEXT_PUBLIC_API_URL = "${{NEXT_PUBLIC_API_URL}}"
NEXT_PUBLIC_BOT_USERNAME = "${{NEXT_PUBLIC_BOT_USERNAME}}"
NEXT_PUBLIC_SITE_URL = "${{NEXT_PUBLIC_SITE_URL}}"

[deploy]
startCommand = "node server.js"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[variables]
NEXT_PUBLIC_API_URL = "https://savdo-api-production.up.railway.app"
NEXT_PUBLIC_BOT_USERNAME = "savdo_builderBOT"
NEXT_PUBLIC_SITE_URL = "https://savdo.uz"
NODE_ENV = "production"
NEXT_TELEMETRY_DISABLED = "1"
