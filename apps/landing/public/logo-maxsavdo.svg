<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MaxSavdo">
  <defs>
    <clipPath id="ms-clip-left">
      <rect x="0" y="0" width="50" height="100" />
    </clipPath>
    <clipPath id="ms-clip-right">
      <rect x="50" y="0" width="50" height="100" />
    </clipPath>
  </defs>
  <!-- Bag handle (gold arc above the M) -->
  <path d="M 35 22 Q 50 4 65 22" stroke="#C9A876" stroke-width="5" fill="none" stroke-linecap="round" />
  <!-- M left half (light foreground for dark backgrounds) -->
  <text x="50" y="92" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="900" font-size="100" fill="#F5F5F5" clip-path="url(#ms-clip-left)">M</text>
  <!-- M right half (Champagne Gold) -->
  <text x="50" y="92" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="900" font-size="100" fill="#C9A876" clip-path="url(#ms-clip-right)">M</text>
</svg>
