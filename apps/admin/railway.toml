[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/admin/Dockerfile"
# DEVOPS-AUDIT-2026-05-14: + packages/types (admin импортирует DTO),
# + packages/ui (после подключения @savdo/ui).
watchPatterns = ["apps/admin/**", "packages/types/**", "packages/ui/**"]

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
# DEVOPS-RAILWAY-DEPLOY-RESILIENCE-001: 3 → 10. Мало ретраев = временный
# сбой снимает деплой навсегда (полный даунтайм до ручного Redeploy).
restartPolicyMaxRetries = 10
