[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"
watchPatterns = ["apps/api/**", "packages/db/**", "packages/types/**"]

[deploy]
startCommand = "sh ./start.sh"
# API-REDIS-RESILIENCE-001: healthcheck смотрит на LIVENESS, а не readiness.
# /api/v1/health/live = процесс жив (без БД/Redis ping). Моргание Redis или
# БД не должно убивать деплой — рестарт pod не чинит внешний сервис, а после
# 3 фейлов Railway помечает деплой "Removed" (полный даунтайм).
# /api/v1/health (с DB+Redis ping) остаётся для мониторинга/дашбордов.
healthcheckPath = "/api/v1/health/live"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
