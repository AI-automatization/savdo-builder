[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/tma/Dockerfile"
# DEVOPS-AUDIT-2026-05-14: + packages/types для пересборки при изменении DTO,
# + packages/ui когда подключим (сейчас TMA сам туда не зависит, но для будущего).
watchPatterns = ["apps/tma/**", "packages/types/**", "packages/ui/**"]

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
# DEVOPS-RAILWAY-DEPLOY-RESILIENCE-001: 3 → 10. Мало ретраев = временный
# сбой снимает деплой навсегда (полный даунтайм до ручного Redeploy).
restartPolicyMaxRetries = 10
