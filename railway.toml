[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/web-buyer/Dockerfile"
watchPatterns = ["apps/web-buyer/**", "packages/types/**", "packages/ui/**"]

[build.args]
NEXT_PUBLIC_API_URL = "${{api.RAILWAY_PUBLIC_DOMAIN}}"
NEXT_PUBLIC_BUYER_URL = "${{savdo-builder-by.RAILWAY_PUBLIC_DOMAIN}}"

[deploy]
startCommand = "node apps/web-buyer/server.js"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
