<?xml version="1.0" encoding="UTF-8"?>
<!--
  Savdo — horizontal lockup (monogram-plate + wordmark)
  Composition: monogram 48x48 + 16px gap + wordmark "Savdo" 32px height.
  Total: ~192 x 48.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="192" height="48" viewBox="0 0 192 48" role="img" aria-label="Savdo">
  <title>Savdo</title>
  <!-- Monogram plate -->
  <rect x="0" y="0" width="48" height="48" rx="11" ry="11" fill="#7C3F2E"/>
  <path
    d="M34 14 H18 a5 5 0 0 0 0 10 h12 a5 5 0 0 1 0 10 H14"
    transform="translate(0 0)"
    stroke="#FBF7F0"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"/>
  <!-- Wordmark "Savdo" — starts at x=64 (48 plate + 16 gap) -->
  <text
    x="64"
    y="35"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif"
    font-size="32"
    font-weight="600"
    letter-spacing="-0.32"
    fill="#7C3F2E">Savdo</text>
</svg>
