services:
  - type: web
    name: savdo-api
    env: node
    region: oregon
    plan: free
    branch: main
    buildCommand: |
      pnpm install
      pnpm db:generate
      pnpm db:migrate:deploy
      pnpm --filter api build
    startCommand: node apps/api/dist/main.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: savdo-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: savdo-redis
          property: connectionString

  - type: redis
    name: savdo-redis
    region: oregon
    plan: free

  - type: psql
    name: savdo-db
    region: oregon
    plan: free
