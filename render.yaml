services:
  # ── API (Web Service) ─────────────────────────────────────────────────────
  - type: web
    name: savdo-api
    runtime: node
    region: frankfurt
    plan: starter
    branch: main
    autoDeploy: true

    buildCommand: pnpm install && pnpm db:generate && pnpm db:migrate:deploy && pnpm --filter api build
    startCommand: node apps/api/dist/main.js

    healthCheckPath: /health

    envVars:
      # App
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: APP_URL
        sync: false

      # Database — injected from the PostgreSQL instance below
      - key: DATABASE_URL
        fromDatabase:
          name: savdo-db
          property: connectionString

      # Redis — injected from the Redis instance below
      - key: REDIS_URL
        fromService:
          name: savdo-redis
          type: redis
          property: connectionString

      # JWT
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d

      # Storage (Cloudflare R2)
      - key: STORAGE_ENDPOINT
        sync: false
      - key: STORAGE_ACCESS_KEY_ID
        sync: false
      - key: STORAGE_SECRET_ACCESS_KEY
        sync: false
      - key: STORAGE_BUCKET_PUBLIC
        value: savdo-public
      - key: STORAGE_BUCKET_PRIVATE
        value: savdo-private
      - key: STORAGE_PUBLIC_URL
        sync: false

      # OTP — Eskiz.uz
      - key: ESKIZ_EMAIL
        sync: false
      - key: ESKIZ_PASSWORD
        sync: false
      - key: ESKIZ_FROM
        value: savdo

      # Telegram Bot
      - key: TELEGRAM_BOT_TOKEN
        sync: false

      # Feature Flags
      - key: CHAT_ENABLED
        value: "true"
      - key: OTP_REQUIRED_FOR_CHECKOUT
        value: "false"
      - key: STORE_APPROVAL_REQUIRED
        value: "false"
      - key: WEB_PUSH_ENABLED
        value: "false"
      - key: MOBILE_PUSH_ENABLED
        value: "false"
      - key: TELEGRAM_NOTIFICATIONS_ENABLED
        value: "false"
      - key: SMS_FALLBACK_ENABLED
        value: "false"
      - key: ANALYTICS_ENABLED
        value: "true"
      - key: SELLER_INSIGHTS_ENABLED
        value: "false"
      - key: DEV_OTP_ENABLED
        value: "false"
      - key: PAYMENT_ONLINE_ENABLED
        value: "false"
      - key: PRODUCT_IMAGE_ATTACHMENT_ENABLED
        value: "false"

      # Auto-cancel
      - key: AUTO_CANCEL_PENDING_AFTER_HOURS
        value: "48"

# ── PostgreSQL ────────────────────────────────────────────────────────────────
databases:
  - name: savdo-db
    plan: starter
    databaseName: savdo
    user: savdo
    region: frankfurt

# ── Redis ─────────────────────────────────────────────────────────────────────
  - type: redis
    name: savdo-redis
    plan: starter
    region: frankfurt
    ipAllowList: []   # only allow internal Render network
